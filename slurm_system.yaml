  partition: dcgp_usr_prod
  account: IscrC_FOCAL_0
  toolchains:
    intel:
      modules: "python/3.11.7:intel-oneapi-compilers"
      modules_build: "python/3.11.7:intel-oneapi-compilers"
    gnu:
      modules: "python/3.11.7"
      modules_build: "python/3.11.7"

epyc-7a53:
