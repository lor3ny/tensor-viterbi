# Per-iteration walltime estimates (HH:MM:SS), one table per backend
# version, measured on results/ryzenb-ai-9/gnu (single-iteration profiling
# runs) and padded 3x: 1.5x margin over the measured value + 2x headroom for
# architectures slower than the ryzen-ai-9 reference machine. Grid points not
# directly measured (10 combos at timesteps=100000, all of timesteps=1000000)
# are extrapolated with a log-log power-law fit (states^2 x duration^1 x
# timesteps^1, fit per version) over the measured points, then padded the
# same way.
#
# get_walltime() sums the per-iteration entries of every version selected
# for a run, multiplies by the job's iteration count, and clamps the result
# to [1 minute, 20 hours] (20h = the top of the "extra" pack).
#
# The `py` version has no measurements (it is the reference pure-Python
# path) and always falls back to `default`.
#
# `gpu` (the --gpu flag, covering both CUDA and ROCm builds) is measured on
# results/a100/cuda (single-iteration profiling runs, steady-state average
# excluding the cold first iteration) and padded 2x margin over the
# measured value. A100 is the oldest/slowest GPU among this repo's gpu
# systems (a100, b200, gh200-hopper, h100, h200), so no extra headroom is
# added for the others. Grid points not directly measured (states in
# {50, 75} at some duration/timesteps combos) are extrapolated by scaling
# the highest measured timesteps value for the same (states, duration)
# linearly with timesteps — walltime scales almost perfectly linearly in
# timesteps on GPU (measured ~9.5-10.3x per decade), unlike the states^2
# scaling used above for CPU backends.
#
# `timesteps=10000000` is intentionally absent from every table above:
# benchmark_params.cfg no longer includes it in the main grid (see that
# file's comment). The sole exception is `gpu`'s "100_10000_10000000" entry
# below, dedicated to the `stress` pack (benchmark_params_stress.cfg) — see
# its inline comment for why that one value is pinned rather than measured.
