#!/bin/bash
# systems.conf — HPC system descriptors for SLURM job submission
#
# Each system entry defines:
#   SYS_TYPE         : "cpu" or "gpu"
#   SYS_PARTITION    : SLURM partition name
#   SYS_ACCOUNT      : SLURM account name
#   SYS_CPUS         : cpus-per-task — CPU systems only, unused for GPU systems
#   SYS_MODULES      : colon-separated modules to load at runtime (benchmark jobs)
#   SYS_MODULES_BUILD: colon-separated modules to load at build time (compile.sh)
#   SYS_GPU_ARCH     : GPU architecture string passed to CMake — GPU systems only
#                      CUDA  : SM version, e.g. "80" for A100
#                      ROCm  : GFX target, e.g. "gfx90a" for MI250x

declare -A SYS_TYPE SYS_PARTITION SYS_ACCOUNT SYS_CPUS SYS_MODULES SYS_MODULES_BUILD SYS_GPU_ARCH

# A100 (Leonardo) — GPU node (CINECA)
SYS_TYPE[a100]="gpu"
SYS_PARTITION[a100]="boost_usr_prod"
SYS_ACCOUNT[a100]="IscrC_FOCAL"
SYS_MODULES[a100]="python:cuda"
SYS_MODULES_BUILD[a100]="cuda:python"
SYS_GPU_ARCH[a100]="80"

# epyc-7763 (LUMI) — standard CPU node (CSC)
SYS_TYPE[epyc-7763]="cpu"
SYS_PARTITION[epyc-7763]="standard"
SYS_ACCOUNT[epyc-7763]="project_465002776"
SYS_CPUS[epyc-7763]=128
SYS_MODULES[epyc-7763]="LUMI/25.03:partition/C:cray-python"
SYS_MODULES_BUILD[epyc-7763]="LUMI/25.03:partition/C:cray-python"

# epyc-7763-bigmem (LUMI) — large-memory CPU node (CSC)
SYS_TYPE[epyc-7763-bigmem]="cpu"
SYS_PARTITION[epyc-7763-bigmem]="small"
SYS_ACCOUNT[epyc-7763-bigmem]="project_465002776"
SYS_CPUS[epyc-7763-bigmem]=128
SYS_MODULES[epyc-7763-bigmem]="LUMI/25.03:partition/C:cray-python"
SYS_MODULES_BUILD[epyc-7763-bigmem]="LUMI/25.03:partition/C:cray-python"

# mi250x (LUMI) — GPU node (CSC)
SYS_TYPE[mi250x]="gpu"
SYS_PARTITION[mi250x]="standard-g"
SYS_ACCOUNT[mi250x]="project_465002776"
SYS_MODULES[mi250x]="LUMI/25.03:partition/G:cray-python"
SYS_MODULES_BUILD[mi250x]="LUMI/25.03:partition/G:rocm:cray-python"
SYS_GPU_ARCH[mi250x]="gfx90a"
