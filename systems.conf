#!/bin/bash
# systems.conf — HPC system descriptors for SLURM job submission
#
# Each system entry defines:
#   SYS_TYPE         : "cpu" or "gpu"
#   SYS_PARTITION    : SLURM partition name
#   SYS_QOS          : SLURM QOS name — optional; used on systems like MareNostrum5
#                      where a QOS is required. Leave unset to omit --qos from sbatch.
#   SYS_ACCOUNT      : SLURM account name
#   SYS_CPUS         : cpus-per-task — CPU systems only, unused for GPU systems
#   SYS_GPU_ARCH     : GPU architecture string passed to CMake — GPU systems only
#                      CUDA  : SM version, e.g. "80" for A100
#                      ROCm  : GFX target, e.g. "gfx90a" for MI250x
#
# Module keys are always toolchain-qualified: SYS_MODULES[<system>/<toolchain>]
#   SYS_UENV         : uenv image to activate (optional); used on systems like
#                      CSCS Alps where uenv replaces traditional module environments.
#                      Format: "<image-name>" e.g. "prgenv-gnu". Activated via
#                      "uenv run --view=modules <image> -- ..." before loading modules.
#                      Leave unset for systems using only modules.
#   SYS_MODULES      : colon-separated modules to load at runtime (benchmark jobs)
#   SYS_PYTHON         : Python executable to use for venv creation (default: python3)
#                      Set when the system's "python3" is too old, e.g. "python3.11"
#   SYS_MODULES_BUILD: colon-separated modules to load at build time (compile.sh)
#
# --toolchain is mandatory for both compile.sh and run_benchmark.sh.
# Results land in results/<system>/<toolchain>/ and builds in build/<system>/<toolchain>/.

declare -A SYS_TYPE SYS_PARTITION SYS_QOS SYS_ACCOUNT SYS_CPUS SYS_UENV SYS_MODULES SYS_MODULES_BUILD SYS_GPU_ARCH SYS_PYTHON
declare -A SYS_METRICS_BACKEND  # optional: token selecting the metrics collector for each system/toolchain

# A100 (Leonardo) — GPU node (CINECA) 
SYS_TYPE[a100]="gpu"
SYS_PARTITION[a100]="boost_usr_prod"
SYS_ACCOUNT[a100]="IscrC_FOCAL"
SYS_GPU_ARCH[a100]="80"
SYS_MODULES[a100/cuda]="cuda:python/3.11.7"
SYS_MODULES_BUILD[a100/cuda]="cuda:python/3.11.7"

# xeon8480 (Leonardo) — CPU node (CINECA)
SYS_TYPE[xeon8480]="cpu"
SYS_PARTITION[xeon8480]="dcgp_usr_prod"
SYS_ACCOUNT[xeon8480]="IscrC_FOCAL_0"
SYS_CPUS[xeon8480]=112
SYS_MODULES[xeon8480/intel]="python/3.11.7:intel-oneapi-compilers"
SYS_MODULES_BUILD[xeon8480/intel]="python/3.11.7:intel-oneapi-compilers"
SYS_MODULES[xeon8480/gnu]="python/3.11.7"
SYS_MODULES_BUILD[xeon8480/gnu]="python/3.11.7"

