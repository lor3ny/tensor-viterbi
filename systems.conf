#!/bin/bash
# systems.conf — HPC system descriptors for SLURM job submission
#
# Each system entry defines:
#   SYS_TYPE         : "cpu" or "gpu"
#   SYS_PARTITION    : SLURM partition name
#   SYS_ACCOUNT      : SLURM account name
#   SYS_CPUS         : cpus-per-task — CPU systems only, unused for GPU systems
#   SYS_GPU_ARCH     : GPU architecture string passed to CMake — GPU systems only
#                      CUDA  : SM version, e.g. "80" for A100
#                      ROCm  : GFX target, e.g. "gfx90a" for MI250x
#
# Module keys are always toolchain-qualified: SYS_MODULES[<system>/<toolchain>]
#   SYS_MODULES      : colon-separated modules to load at runtime (benchmark jobs)
#   SYS_MODULES_BUILD: colon-separated modules to load at build time (compile.sh)
#
# --toolchain is mandatory for both compile.sh and run_benchmark.sh.
# Results land in results/<system>/<toolchain>/ and builds in build/<system>/<toolchain>/.

declare -A SYS_TYPE SYS_PARTITION SYS_ACCOUNT SYS_CPUS SYS_MODULES SYS_MODULES_BUILD SYS_GPU_ARCH
declare -A SYS_METRICS_BACKEND  # optional: token selecting the metrics collector for each system/toolchain

# A100 (Leonardo) — GPU node (CINECA) 
SYS_TYPE[a100]="gpu"
SYS_PARTITION[a100]="boost_usr_prod"
SYS_ACCOUNT[a100]="IscrC_FOCAL"
SYS_GPU_ARCH[a100]="80"
SYS_MODULES[a100/cuda]="python:cuda"
SYS_MODULES_BUILD[a100/cuda]="cuda:python"

# xeon8480 (Leonardo) — CPU node (CINECA)
SYS_TYPE[xeon8480]="cpu"
SYS_PARTITION[xeon8480]="dcgp_usr_prod"
SYS_ACCOUNT[xeon8480]="IscrC_FOCAL_0"
SYS_CPUS[xeon8480]=112
SYS_MODULES[xeon8480/intel]="python:intel-oneapi-compilers"
SYS_MODULES_BUILD[xeon8480/intel]="python:intel-oneapi-compilers"
SYS_MODULES[xeon8480/gcc]="python"
SYS_MODULES_BUILD[xeon8480/gcc]="python"

## epyc-7763 (LUMI) — standard CPU node (CSC)
#SYS_TYPE[epyc-7763]="cpu"
#SYS_PARTITION[epyc-7763]="standard"
#SYS_ACCOUNT[epyc-7763]="project_465002776"
#SYS_CPUS[epyc-7763]=128
#SYS_MODULES[epyc-7763/cray]="LUMI/25.03:partition/C:cray-python"
#SYS_MODULES_BUILD[epyc-7763/cray]="LUMI/25.03:partition/C:cray-python"

# epyc-7763-bigmem (LUMI) — large-memory CPU node (CSC)
SYS_TYPE[epyc-7763-bigmem]="cpu"
SYS_PARTITION[epyc-7763-bigmem]="small"
SYS_ACCOUNT[epyc-7763-bigmem]="project_465002776"
SYS_CPUS[epyc-7763-bigmem]=128
SYS_MODULES[epyc-7763-bigmem/cray]="LUMI/25.03:partition/C:cray-python"
SYS_MODULES_BUILD[epyc-7763-bigmem/cray]="LUMI/25.03:partition/C:cray-python"
SYS_MODULES[epyc-7763-bigmem/aocc]="LUMI/25.03:partition/C:cray-python:PrgEnv-aocc"
SYS_MODULES_BUILD[epyc-7763-bigmem/aocc]="LUMI/25.03:partition/C:cray-python:PrgEnv-aocc"
SYS_MODULES[epyc-7763-bigmem/gnu]="LUMI/25.03:partition/C:cray-python:PrgEnv-gnu"
SYS_MODULES_BUILD[epyc-7763-bigmem/gnu]="LUMI/25.03:partition/C:cray-python:PrgEnv-gnu"

# mi250x (LUMI) — GPU node (CSC)
SYS_TYPE[mi250x]="gpu"
SYS_PARTITION[mi250x]="standard-g"
SYS_ACCOUNT[mi250x]="project_465002776"
SYS_GPU_ARCH[mi250x]="gfx90a"
SYS_MODULES[mi250x/cray]="LUMI/25.03:partition/G:cray-python"
SYS_MODULES_BUILD[mi250x/cray]="LUMI/25.03:partition/G:rocm:cray-python"
SYS_MODULES[mi250x/amd]="LUMI/25.03:partition/G:cray-python:PrgEnv-AMD"
SYS_MODULES_BUILD[mi250x/amd]="LUMI/25.03:partition/G:rocm:cray-python:PrgEnv-AMD"
SYS_MODULES[mi250x/gnu]="LUMI/25.03:partition/G:cray-python:PrgEnv-gnu"
SYS_MODULES_BUILD[mi250x/gnu]="LUMI/25.03:partition/G:rocm:cray-python:PrgEnv-gnu"

# Metrics backend tokens — maps system/toolchain to a collector in tensor_viterbi/metrics.py.
# Leave unset (or set to "none") for no extra metrics.
SYS_METRICS_BACKEND[epyc-7763-bigmem/cray]="cray_pm"
